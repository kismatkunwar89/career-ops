# Career-Ops Portal Scanner — Cybersecurity / SOC Focus
# Customized for: Kismat Kunwar (F-1 OPT, CT/NY/Remote, entry-level blue team)
#
# HOW TO USE:
#   cp templates/portals.example.yml portals.yml
#   Then run /career-ops scan inside Claude Code

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- SOC / Blue Team --
    - "SOC Analyst"
    - "Security Operations"
    - "Security Analyst"
    - "Cybersecurity Analyst"
    - "Information Security Analyst"
    - "Cyber Analyst"
    # -- Incident Response --
    - "Incident Response"
    - "IR Analyst"
    - "DFIR"
    - "Digital Forensics"
    - "Threat Hunter"
    - "Threat Hunting"
    # -- Threat Intelligence --
    - "Threat Intelligence"
    - "CTI Analyst"
    - "Cyber Threat"
    - "Intelligence Analyst"
    # -- Detection Engineering --
    - "Detection Engineer"
    - "Detection and Response"
    - "SIEM Engineer"
    - "SIEM Analyst"
    # -- Security Engineering (entry) --
    - "Security Engineer"
    - "Cybersecurity Engineer"
    - "Cloud Security"
    - "Identity Security"
    # -- Vulnerability / GRC (adjacent) --
    - "Vulnerability Analyst"
    - "Penetration Tester"
    - "Pentest"
    - "Red Team"
    - "GRC Analyst"

  negative:
    # Exclude senior/lead roles that won't consider entry-level
    - "Director"
    - "VP "
    - "Chief "
    - "CISO"
    - "Principal"
    - "Staff Security"
    # Exclude clearance-required roles (citizenship needed)
    - "TS/SCI"
    - "Top Secret"
    - "Secret Clearance Required"
    - "Active Clearance"
    # Exclude non-security IT
    - "IT Support"
    - "Help Desk"
    - "Desktop Support"
    - "Salesforce"
    - "SAP"
    - "COBOL"
    - "iOS"
    - "Android"

  seniority_boost:
    - "Junior"
    - "Associate"
    - "Entry"
    - "Tier 1"
    - "Tier 2"
    - "Mid-Level"

# -- Search queries --

search_queries:

  # -- Greenhouse: MSSPs & Security Vendors --
  - name: Greenhouse — SOC Analyst
    query: 'site:job-boards.greenhouse.io "SOC Analyst" OR "Security Analyst" OR "Incident Response" remote OR "hybrid"'
    enabled: true

  - name: Greenhouse — Threat Intelligence
    query: 'site:job-boards.greenhouse.io "Threat Intelligence" OR "CTI Analyst" OR "Threat Hunter" remote'
    enabled: true

  - name: Greenhouse — Detection Engineer
    query: 'site:job-boards.greenhouse.io "Detection Engineer" OR "SIEM Engineer" OR "Security Operations Engineer" remote'
    enabled: true

  # -- Lever: Cybersecurity companies --
  - name: Lever — SOC & IR
    query: 'site:jobs.lever.co "SOC Analyst" OR "Incident Response" OR "Security Analyst" remote'
    enabled: true

  - name: Lever — Threat Intel & Hunting
    query: 'site:jobs.lever.co "Threat Intelligence" OR "Threat Hunter" OR "CTI" remote'
    enabled: true

  # -- Ashby: Startups --
  - name: Ashby — Security Analyst
    query: 'site:jobs.ashbyhq.com "Security Analyst" OR "SOC" OR "Incident Response" remote'
    enabled: true

  # -- Wellfound: Cybersecurity startups --
  - name: Wellfound — Cybersecurity entry-level
    query: 'site:wellfound.com "SOC Analyst" OR "Security Analyst" OR "Cybersecurity Analyst" entry level OR junior'
    enabled: true

  # -- Broad: Finance sector SOC (strong H-1B sponsorship) --
  - name: Finance — SOC & Security
    query: '"SOC Analyst" OR "Security Operations Analyst" bank OR financial OR insurance remote OR "New York" OR "Connecticut"'
    enabled: true

  # -- Broad: Healthcare SOC (strong CT presence) --
  - name: Healthcare — Cybersecurity CT/NY
    query: '"Security Analyst" OR "SOC Analyst" hospital OR healthcare OR health system Connecticut OR "New York" OR remote'
    enabled: true

  # -- Broad: Defense contractors (H-1B sponsors, clearance optional) --
  - name: Defense Contractors — Entry Cyber
    query: '"Cybersecurity Analyst" OR "SOC Analyst" Leidos OR "Booz Allen" OR SAIC OR Peraton "no clearance" OR "clearance preferred" OR "entry level"'
    enabled: true

  # -- Indeed/LinkedIn aggregators --
  - name: Indeed — SOC Analyst CT/NY/Remote
    query: 'site:indeed.com "SOC Analyst" OR "Security Analyst" Connecticut OR "New York" OR remote "entry level" OR "0-2 years"'
    enabled: true

